<div class="page-header">
  <h1 class="page-header__title">Dashboard</h1>
  <p class="page-header__subtitle">Operational overview for strategy activity, runs, and system status.</p>
</div>
<div class="workspace-shell" aria-label="Dashboard workspace">
  <section class="workspace-main">
    <div class="workspace-strip">
      <div class="workspace-kpi"><span class="workspace-kpi__label">Backtests</span><span class="workspace-kpi__value">--</span></div>
      <div class="workspace-kpi"><span class="workspace-kpi__label">Active Jobs</span><span class="workspace-kpi__value">--</span></div>
      <div class="workspace-kpi"><span class="workspace-kpi__label">Strategies</span><span class="workspace-kpi__value">--</span></div>
    </div>
    <section class="workspace-block">
      <h2 class="section-title">Recent Runs</h2>
      <p class="text-muted text-sm">Latest completed and in-progress runs appear here.</p>
    </section>
  </section>
  <aside class="workspace-rail">
    <section class="workspace-block">
      <h2 class="section-title">Signals</h2>
      <ul class="workspace-list">
        <li>Execution health</li>
        <li>Recent errors</li>
        <li>Queue depth</li>
      </ul>
    </section>
  </aside>
</div>
