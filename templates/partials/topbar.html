<header class="topbar" id="topbar" data-topbar>

  <div class="topbar__left">
    <button class="topbar__btn topbar__btn--icon topbar__mobile-toggle" id="topbar-menu-btn" data-sidebar-open title="Open navigation" aria-label="Open navigation">
      <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.5 4h11" stroke-linecap="round"/>
        <path d="M2.5 8h11" stroke-linecap="round"/>
        <path d="M2.5 12h11" stroke-linecap="round"/>
      </svg>
    </button>
    <div class="topbar__title-wrap">
      <span class="topbar__eyebrow">Trading OS</span>
      <span class="topbar__page-title" id="topbar-page-title" data-page-title>Dashboard</span>
    </div>
  </div>

  <div class="topbar__right">

    <button class="topbar__btn topbar__btn--icon topbar__ai-toggle" id="topbar-ai-btn" data-ai-dock-open title="Open AI panel" aria-label="Open AI panel">
      <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 5.25A2.25 2.25 0 0 1 5.25 3h5.5A2.25 2.25 0 0 1 13 5.25v3.5A2.25 2.25 0 0 1 10.75 11H7l-2.5 2v-2H5.25A2.25 2.25 0 0 1 3 8.75v-3.5Z" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <!-- FreqTrade connection status -->
    <div class="status-pill status-pill--idle" id="ft-status-pill" data-ft-status>
      <span class="status-pill__dot"></span>
      <span id="ft-status-label" data-ft-status-label>Idle</span>
    </div>

    <div class="topbar__divider"></div>

    <!-- Refresh / reload action -->
    <button class="topbar__btn topbar__btn--icon" id="topbar-refresh-btn" data-action="refresh" title="Refresh" aria-label="Refresh">
      <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
        <path d="M13.5 2.5A6.5 6.5 0 0 0 2 8" stroke-linecap="round"/>
        <path d="M2.5 13.5A6.5 6.5 0 0 0 14 8"  stroke-linecap="round"/>
        <polyline points="13.5,2.5 13.5,5.5 10.5,5.5" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="2.5,13.5 2.5,10.5 5.5,10.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <!-- Stop running job -->
    <button class="topbar__btn" id="topbar-stop-btn" data-action="stop-job" style="display:none;" title="Stop running job">
      <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="3" width="10" height="10" rx="1"/>
      </svg>
      Stop
    </button>

  </div>

</header>
